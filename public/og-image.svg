<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="PaperTrail — format spreadsheets into clean, print-ready PDF reports">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1c4b"/>
      <stop offset="1" stop-color="#141428"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b5cd6"/>
      <stop offset="1" stop-color="#3b3c95"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle dot grid -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/>
    <circle cx="1120" cy="470" r="2"/><circle cx="1040" cy="470" r="2"/><circle cx="960" cy="470" r="2"/>
    <circle cx="1120" cy="550" r="2"/><circle cx="1040" cy="550" r="2"/><circle cx="960" cy="550" r="2"/>
  </g>

  <!-- document / report glyph -->
  <g transform="translate(84,150)">
    <rect x="0" y="0" width="230" height="300" rx="18" fill="#ffffff"/>
    <rect x="0" y="0" width="230" height="64" rx="18" fill="url(#accent)"/>
    <rect x="0" y="46" width="230" height="18" fill="url(#accent)"/>
    <rect x="28" y="96" width="120" height="14" rx="7" fill="#3b3c95" opacity="0.35"/>
    <rect x="28" y="130" width="174" height="10" rx="5" fill="#141428" opacity="0.18"/>
    <rect x="28" y="152" width="174" height="10" rx="5" fill="#141428" opacity="0.18"/>
    <rect x="28" y="174" width="130" height="10" rx="5" fill="#141428" opacity="0.18"/>
    <rect x="28" y="210" width="174" height="10" rx="5" fill="#141428" opacity="0.12"/>
    <rect x="28" y="232" width="174" height="10" rx="5" fill="#141428" opacity="0.12"/>
    <rect x="150" y="262" width="52" height="20" rx="6" fill="#3b3c95" opacity="0.85"/>
  </g>

  <!-- wordmark + copy -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="380" y="210" font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-2">PaperTrail</text>
    <text x="384" y="292" font-size="40" font-weight="600" fill="#c7c8f0">Spreadsheets → clean PDF reports</text>
    <text x="384" y="352" font-size="27" font-weight="400" fill="#9a9bc4">Format Excel, CSV &amp; TSV into print-ready A4 documents.</text>
    <text x="384" y="392" font-size="27" font-weight="400" fill="#9a9bc4">100% in your browser — your files never leave your device.</text>

    <!-- badges -->
    <g transform="translate(384,440)">
      <rect x="0" y="0" width="150" height="52" rx="26" fill="#ffffff" opacity="0.08"/>
      <text x="75" y="34" font-size="24" font-weight="600" fill="#ffffff" text-anchor="middle">Free</text>
      <rect x="166" y="0" width="176" height="52" rx="26" fill="#ffffff" opacity="0.08"/>
      <text x="254" y="34" font-size="24" font-weight="600" fill="#ffffff" text-anchor="middle">Private</text>
      <rect x="358" y="0" width="212" height="52" rx="26" fill="#ffffff" opacity="0.08"/>
      <text x="464" y="34" font-size="24" font-weight="600" fill="#ffffff" text-anchor="middle">No sign-up</text>
    </g>
  </g>
</svg>
